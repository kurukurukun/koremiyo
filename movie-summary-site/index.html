<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コレミヨ (KOREMIYO) - 今日の映画選びを絶対に外さない</title>
    <meta name="description"
        content="「今日の映画選びを絶対に外さない」歴代アカデミー賞受賞作や高評価の超名作だけを厳選して紹介する映画おすすめサイト「KOREMIYO(コレミヨ)」。AmazonプライムやU-NEXTなどの配信状況も一目で分かります。">

    <!-- OGP (Open Graph Protocol) 設定 -->
    <meta property="og:title" content="コレミヨ (KOREMIYO)">
    <meta property="og:description" content="今日の映画選びを絶対に外さない。アカデミー賞受賞作や高評価の名作だけを厳選。ka">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.koremiyo.com/">
    <meta property="og:image" content="https://www.koremiyo.com/assets/ogp-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- SEO用の隠しh1タグ -->
    <h1
        style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">
        歴代アカデミー賞から厳選！絶対外さないおすすめ名作映画まとめ - KOREMIYO</h1>
    <header>
        <div class="logo" id="logoBtn" style="cursor: pointer; display: flex; align-items: baseline; gap: 0.5rem;">
            <span class="fa-stack" style="font-size: 0.65em; margin-right: -0.1rem; transform: translateY(-2px);">
                <i class="fa-solid fa-ticket fa-stack-2x"
                    style="color: var(--primary-color); transform: rotate(-15deg);"></i>
                <i class="fa-solid fa-check fa-stack-1x"
                    style="color: var(--bg-color); transform: rotate(-15deg) scale(1.3); font-weight: 900;"></i>
            </span>
            <span style="color: var(--text-primary);">KOREMIYO</span>
            <small
                style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.5px;">コレミヨ</small>
            <span
                style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 400; letter-spacing: 0.5px; margin-left: 0.3rem;">〜今日の映画選びを絶対に外さない〜</span>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="映画タイトルで検索...">
            <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero" id="heroSection">
            <div class="hero-content">
                <h1 id="heroTitle">話題の最新映画をチェック</h1>
                <p id="heroOverview">話題作のあらすじ、キャスト、レビューをまとめて確認できます。</p>
                <button id="heroMoreBtn" class="primary-btn" style="display:none;">詳細を見る</button>
            </div>
            <div class="hero-backdrop" id="heroBackdrop"></div>
            <div class="hero-overlay"></div>
        </section>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="trending">公開中の話題作</button>
            <button class="tab-btn" data-tab="academy">歴代アカデミー賞</button>
            <button class="tab-btn" data-tab="goldenglobe">ゴールデングローブ賞（ドラマ）</button>
        </div>

        <!-- Movie Grid Section -->
        <section class="movies-section">
            <h2 class="section-title" id="sectionTitle">公開中の話題作</h2>
            <div class="movies-grid" id="moviesGrid">
                <!-- Movie Cards will be injected here -->
            </div>
            <div class="loader" id="loader" style="display: none;">
                <div class="spinner"></div>
            </div>
        </section>
    </main>

    <!-- 映画詳細モーダル -->
    <div class="modal-backdrop" id="movieModal" style="display: none;">
        <div class="modal-content movie-modal">
            <button class="close-btn" id="closeMovieModal"><i class="fa-solid fa-times"></i></button>
            <div class="modal-body" id="movieModalBody">
                <!-- Movie details injected here -->
            </div>
        </div>
    </div>

    <script src="js/academy_data.js"></script>
    <script src="js/golden_globe_data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
